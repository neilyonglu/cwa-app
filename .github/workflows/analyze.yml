name: Analyze

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  analyze:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Workspace pubspec includes cwa_app_flutter → must install Flutter SDK
      # (Dart-only setup fails: "cwa_app_flutter requires the Flutter SDK")
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'

      - name: Install dependencies
        working-directory: cwa_app_server
        run: flutter pub get

      - name: Analyze
        working-directory: cwa_app_server
        run: dart analyze --fatal-infos
