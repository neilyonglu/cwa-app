name: Format

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  format:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Workspace pubspec includes cwa_app_flutter → must install Flutter SDK
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'

      - name: Install dependencies
        working-directory: cwa_app_server
        run: flutter pub get

      - name: Check formatting
        working-directory: cwa_app_server
        run: dart format --set-exit-if-changed .
