name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      VERSION: '3.4.8'
      SERVERPOD_PASSWORD_database: '-7SVc6WIxfSjfrLVvZB5D_cc90Kt5-BW'
      SERVERPOD_PASSWORD_redis: 'L62E-3-rTMywwdzGqhE9oRdfvlnPL-V6'

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'

      # --quiet-build removed: not supported by docker compose on ubuntu-latest runner
      - name: Start containers
        working-directory: cwa_app_server
        run: docker compose up --quiet-pull --build -d

      # flutter pub get (not dart pub get): workspace includes cwa_app_flutter
      - name: Install dependencies
        working-directory: cwa_app_server
        run: flutter pub get

      - name: Install Serverpod CLI
        working-directory: cwa_app_server
        run: dart pub global activate serverpod_cli $VERSION

      - name: Run Serverpod generator
        working-directory: cwa_app_server
        run: serverpod generate

      - name: Run tests
        working-directory: cwa_app_server
        run: dart test

      - name: Stop containers
        if: always()
        working-directory: cwa_app_server
        run: docker compose down -v
